    <textarea id="original-markdown" style="display:none;"># 第一章 企业职能与战略决策

## 第一节 企业与企业管理的职能
### 企业的概念与特征
- 经济性（以营利为目的）
- 社会性（满足社会需要）
- 独立性（自主经营、自负盈亏）
- 法人性（依法设立）

### 企业管理的职能（决组领控创激）
- 决策（做正确的事）
- 计划（蓝图与路径）
- 组织（搭班子）
- 领导（带队伍）
- 控制（纠偏）
- 创新（变革图强）

## 第二节 企业战略分析
### 企业战略的层次
- 总体战略（公司层）- 做什么业务
- 业务战略（业务层）- 怎么做这个业务
- 职能战略 - 如何支撑业务战略

### PEST分析
- P：政治法律环境
- E：经济环境
- S：社会文化环境
- T：技术环境

### 波特五力模型
- 行业内现有企业竞争
- 新进入者的威胁
- 替代品的威胁
- 供应商的议价能力
- 买方的议价能力

### 内部环境分析
- 核心竞争力（VRIN框架）
- 价值链分析
- 波士顿矩阵（明星/金牛/问题/瘦狗）
- SWOT分析（SO/WO/ST/WT战略）

## 第三节 企业战略制定
### 总体战略
- 发展战略（密集型/一体化/多元化）
- 稳定战略
- 紧缩战略
- 组合战略

### 一体化战略
- 前向一体化（向下游/客户）
- 后向一体化（向上游/供应商）
- 横向一体化（同行业）

### 竞争战略（波特三大）
- 成本领先战略
- 差异化战略
- 集中化战略

## 第四节 企业商业模式
### 魏朱六要素模型
- 定位（起点）
- 业务系统（核心）
- 盈利模式（关键）
- 关键资源能力（支撑）
- 现金流结构（运行）
- 企业价值（结果）

### 商业模式画布（九模块）
- 客户细分
- 价值主张
- 渠道通路
- 客户关系
- 收入来源
- 核心资源
- 关键业务
- 重要合作
- 成本结构

## 第五节 企业经营决策
### 决策类型
- 确定型/风险型/不确定型

### 定性决策方法
- 头脑风暴法
- 德尔菲法
- 名义小组技术

### 定量决策方法
- 盈亏平衡分析法
- 期望损益决策法
- 决策树法
- 不确定型（乐观/悲观/折中/后悔值/等概率）</textarea>

                : format === 'jpeg' 
                  ? htmlToImage.toJpeg(node, options) 
                  : htmlToImage.toPng(node, options);
              
              exportPromise
                .then((dataUrl) => {
                  const link = document.createElement('a');
                  const timestamp = new Date().toISOString().slice(0, 10);
                  link.download = `markmap-${timestamp}.${format === 'jpeg' ? 'jpg' : format === 'svg' ? 'svg' : 'png'}`;
                  link.href = dataUrl;
                  link.click();
                })
                .catch((err) => console.error("Export failed:", err));
            })
            .catch((err) => {
                throw err;
            });
              
          } catch (e) {
            console.error('Error exporting image:', e);
            alert('Image export failed: ' + e.message);
          }
        }
      })();
    </script>
  
</body>
</html>
